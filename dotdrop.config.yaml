config:
  backup: false
  banner: false
  create: true
  dotpath: dotfiles
  keepdot: false
  link_dotfile_default: nolink
  link_on_import: nolink
  longkey: false

dotfiles:
  # == ~/ ==
  d_gnupg:
    dst: ~/.gnupg
    src: .gnupg
  d_ipython:
    dst: ~/.ipython
    src: .ipython
  d_ssh:
    dst: ~/.ssh
    src: .ssh
  f_gitconfig:
    dst: ~/.gitconfig
    src: .gitconfig

  # == ~/.claude ==
  f_claude_settings:
    dst: ~/.claude/settings.json
    src: .claude/settings.json
  f_claude_statusline:
    dst: ~/.claude/statusline-command.sh
    src: .claude/statusline-command.sh

  # == ~/.config ==
  d_bat:
    dst: ~/.config/bat
    src: .config/bat
  d_bottom:
    dst: ~/.config/bottom
    src: .config/bottom
  d_delta:
    dst: ~/.config/delta
    src: .config/delta
  d_fastfetch:
    dst: ~/.config/fastfetch
    src: .config/fastfetch
  d_fish:
    dst: ~/.config/fish
    src: .config/fish
  d_ghostty:
    dst: ~/.config/ghostty
    src: .config/ghostty
  d_helix:
    dst: ~/.config/helix
    src: .config/helix
  d_k9s:
    dst: ~/.config/k9s
    src: .config/k9s
  d_karabiner:
    dst: ~/.config/karabiner
    src: .config/karabiner
  d_lazygit:
    dst: ~/.config/lazygit
    src: .config/lazygit
  d_rectangle:
    dst: ~/.config/rectangle
    src: .config/rectangle
  d_spicetify:
    dst: ~/.config/spicetify
    src: .config/spicetify
  d_stylus:
    dst: ~/.config/stylus
    src: .config/stylus
  d_zed:
    dst: ~/.config/zed
    src: .config/zed
  d_zellij:
    dst: ~/.config/zellij
    src: .config/zellij
  f_starship:
    dst: ~/.config/starship.toml
    src: .config/starship.toml

  # == iCloud (Obsidian vault) ==
  # Obsidian stores config inside the vault at <vault>/.obsidian — only the
  # theme + snippet dirs are tracked here; everything else (workspace, plugins,
  # app state) stays vault-owned. ~/Vault symlinks to the iCloud path (see vault-link recipe).
  d_obsidian_themes:
    dst: "~/Library/Mobile Documents/iCloud~md~obsidian/Documents/Vault/.obsidian/themes"
    src: .config/obsidian/themes
  d_obsidian_snippets:
    dst: "~/Library/Mobile Documents/iCloud~md~obsidian/Documents/Vault/.obsidian/snippets"
    src: .config/obsidian/snippets

  # == ~/Library/Application Support ==
  # zen reads chrome CSS from the active browser profile; the profile id below is
  # machine-specific — update it (and re-run install) if the zen profile changes.
  f_zen_userchrome:
    dst: "~/Library/Application Support/zen/Profiles/6im8xt7o.Default (release)/chrome/userChrome.css"
    src: .config/zen/popil/userChrome.css
  f_zen_usercontent:
    dst: "~/Library/Application Support/zen/Profiles/6im8xt7o.Default (release)/chrome/userContent.css"
    src: .config/zen/popil/userContent.css
  f_zen_user_overrides:
    dst: "~/Library/Application Support/zen/Profiles/6im8xt7o.Default (release)/user-overrides.js"
    src: .config/zen/user-overrides.js

profiles:
  default:
    dotfiles:
      - d_bat
      - d_bottom
      - d_delta
      - d_fastfetch
      - d_fish
      - d_ghostty
      - d_gnupg
      - d_helix
      - d_ipython
      - d_k9s
      - d_lazygit
      - d_karabiner
      - d_rectangle
      - d_ssh
      - d_spicetify
      - d_stylus
      - d_zed
      - d_zellij
      - f_claude_settings
      - f_claude_statusline
      - f_gitconfig
      - f_starship

  me:
    dotfiles:
      - d_obsidian_themes
      - d_obsidian_snippets
      - f_zen_userchrome
      - f_zen_usercontent
      - f_zen_user_overrides
