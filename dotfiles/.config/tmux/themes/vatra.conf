# vatra — tmux theme

set -g status-style "fg=#d4be98,bg=#1a1a19"
set -g status-left-style "fg=#ec7f3e,bg=#1a1a19,bold"
set -g status-right-style "fg=#a89984,bg=#1a1a19"

set -g window-status-style "fg=#a89984,bg=#1a1a19"
set -g window-status-current-style "fg=#1f1f1e,bg=#ec7f3e,bold"
set -g window-status-activity-style "fg=#e0b04a,bg=#1a1a19"
set -g window-status-bell-style "fg=#ea6962,bg=#1a1a19,bold"
set -g window-status-separator ""

set -g pane-border-style "fg=#262625"
set -g pane-active-border-style "fg=#ec7f3e"

set -g message-style "fg=#e4e2de,bg=#2e2e2c"
set -g message-command-style "fg=#e4e2de,bg=#2e2e2c"

set -g mode-style "fg=#1f1f1e,bg=#e0b04a,bold"

set -g copy-mode-match-style "fg=#1f1f1e,bg=#89b482"
set -g copy-mode-current-match-style "fg=#1f1f1e,bg=#ec7f3e,bold"

set -g clock-mode-colour "#ec7f3e"

set -g display-panes-colour "#78716c"
set -g display-panes-active-colour "#ec7f3e"
