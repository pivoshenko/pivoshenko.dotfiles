# popil — tmux theme

set -g status-style "fg=#b8b3a8,bg=#1a1a19"
set -g status-left-style "fg=#d97757,bg=#1a1a19,bold"
set -g status-right-style "fg=#9b958a,bg=#1a1a19"

set -g window-status-style "fg=#9b958a,bg=#1a1a19"
set -g window-status-current-style "fg=#1f1f1e,bg=#d97757,bold"
set -g window-status-activity-style "fg=#d4a85a,bg=#1a1a19"
set -g window-status-bell-style "fg=#c87a72,bg=#1a1a19,bold"
set -g window-status-separator ""

set -g pane-border-style "fg=#262625"
set -g pane-active-border-style "fg=#d97757"

set -g message-style "fg=#e4e2de,bg=#2e2e2c"
set -g message-command-style "fg=#e4e2de,bg=#2e2e2c"

set -g mode-style "fg=#1f1f1e,bg=#d4a85a,bold"

set -g copy-mode-match-style "fg=#1f1f1e,bg=#7ba0c4"
set -g copy-mode-current-match-style "fg=#1f1f1e,bg=#d97757,bold"

set -g clock-mode-colour "#d97757"

set -g display-panes-colour "#78716c"
set -g display-panes-active-colour "#d97757"
