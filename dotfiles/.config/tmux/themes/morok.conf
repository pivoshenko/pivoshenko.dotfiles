# morok — tmux theme

set -g status-style "fg=#d6d3d1,bg=#0d0d0d"
set -g status-left-style "fg=#7f98bf,bg=#0d0d0d,bold"
set -g status-right-style "fg=#a8a29e,bg=#0d0d0d"

set -g window-status-style "fg=#a8a29e,bg=#0d0d0d"
set -g window-status-current-style "fg=#111111,bg=#7f98bf,bold"
set -g window-status-activity-style "fg=#d4b070,bg=#0d0d0d"
set -g window-status-bell-style "fg=#d97777,bg=#0d0d0d,bold"
set -g window-status-separator ""

set -g pane-border-style "fg=#191919"
set -g pane-active-border-style "fg=#7f98bf"

set -g message-style "fg=#e7e5e4,bg=#212121"
set -g message-command-style "fg=#e7e5e4,bg=#212121"

set -g mode-style "fg=#111111,bg=#9faece,bold"

set -g copy-mode-match-style "fg=#111111,bg=#7ea59d"
set -g copy-mode-current-match-style "fg=#111111,bg=#7f98bf,bold"

set -g clock-mode-colour "#7f98bf"

set -g display-panes-colour "#78716c"
set -g display-panes-active-colour "#7f98bf"
